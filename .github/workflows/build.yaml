name: build

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yaml'
  pull_request:
    paths:
      - 'public/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yaml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # NOTE: pin every action to a commit SHA before relying on this workflow;
      # Dependabot then keeps the SHAs updated.
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/links
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: .
          # amd64 only for now (arm64 deferred). Provenance is left on (default),
          # so each build produces ~3 GHCR versions (index + image + provenance);
          # cleanup keeps 8 to retain the current image and a full previous with
          # headroom.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
