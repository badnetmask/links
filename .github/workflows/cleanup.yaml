name: cleanup

# Prune old GHCR image versions so only the current image and one previous
# (a rollback backup) remain. Runs after a successful build; can also be run
# manually from the Actions tab.
#
# The image is single-arch (amd64) but keeps provenance, so each build produces
# ~3 GHCR versions (index + image + provenance manifest). We keep 8 so the
# current image AND a full previous survive intact, with headroom. The official
# action counts manifests and can't protect a tagged image's children, which is
# why the count is generous rather than exactly 2.

on:
  workflow_run:
    workflows: [build]
    types: [completed]
  workflow_dispatch:

permissions:
  packages: write

jobs:
  prune:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: links
          package-type: container
          min-versions-to-keep: 8
