version: 2
updates:
  # nginx base image in the Dockerfile (keeps the pinned digest fresh)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)

  # GitHub Actions used by the build workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
