version: 2
updates:
  # nginx base image in the Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
    ignore:
      # nginx: stay on the stable line — take patch updates only.
      # (Dependabot can't distinguish stable [even minor] from mainline [odd],
      #  so skip minor/major bumps; move stable minors manually.)
      - dependency-name: "nginxinc/nginx-unprivileged"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  # GitHub Actions used by the build workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
